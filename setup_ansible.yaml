---
- name: Setup Ultimate Awesome Dev Environment (Unified, No Snap)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    user_home: "{{ lookup('env', 'HOME') }}"
    user_id: "{{ lookup('env', 'USER') }}"
    zellij_ver: "0.43.1"
    delta_ver: "0.17.0"
    nerdfonts_ver: "3.2.1"

    # GitHub API rate limit 대응: 옵션 지원
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') | default('', true) }}"
    github_headers: >-
      {{
        { 'Accept': 'application/vnd.github+json' }
        | combine( ((github_token | length) > 0)
          | ternary({ 'Authorization': 'Bearer ' ~ github_token }, {}) )
      }}

    # Cargo tools creates 정확화 (name != binary 인 경우 반영)
      - { name: "du-dust", bin: "dust" }
      - { name: "eza", bin: "eza" }
      - { name: "zoxide", bin: "zoxide" }
      - { name: "hyperfine", bin: "hyperfine" }
      - { name: "tealdeer", bin: "tldr" }
      - { name: "fd-find", bin: "fd" }
      - { name: "starship", bin: "starship" }
      - { name: "bat", bin: "batcat" }
      - { name: "difftastic", bin: "difft" }

  tasks:
    # -------------------------------------------------------
    # 0. 기본 패키지 (Snap 의존성 제거)
    # -------------------------------------------------------
    - name: Install base dependencies & Apt tools
      ansible.builtin.apt:
        name:
          - curl
          - git
          - wget
          - unzip
          - tar
          - build-essential
          - software-properties-common
          - taskwarrior
          - shellcheck
          - asciinema
          - fzf
          - fontconfig
          - libsqlite3-dev
          - nodejs
          - npm
          - btop
          - ca-certificates
          - gnupg
          - ffmpegthumbnailer
          - 7zip
          - poppler-utils
          - fontconfig
          - direnv
        state: present
        update_cache: yes
    # -------------------------------------------------------
    # 1. Glow 설치 (Charm APT repo 방식)
    # -------------------------------------------------------
    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Charm repo GPG key
      ansible.builtin.get_url:
        url: https://repo.charm.sh/apt/gpg.key
        dest: /tmp/charm.gpg.key
        mode: "0644"

    - name: Dearmor Charm GPG key into keyring
      ansible.builtin.command: >
        gpg --dearmor -o /etc/apt/keyrings/charm.gpg /tmp/charm.gpg.key
      args:
        creates: /etc/apt/keyrings/charm.gpg

    - name: Add Charm APT repo list
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/charm.list
        mode: "0644"
        content: |
          deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *

    - name: Install glow
      ansible.builtin.apt:
        name: glow
        state: present
        update_cache: yes

    # -------------------------------------------------------
    # 2. Rust (Cargo)
    # -------------------------------------------------------
    - name: Download Rustup installer
      ansible.builtin.get_url:
        url: https://sh.rustup.rs
        dest: /tmp/rustup.sh
        mode: "0755"
      become_user: "{{ user_id }}"

    - name: Install Rust (non-interactive)
      ansible.builtin.shell: /tmp/rustup.sh -y
      args:
        creates: "{{ user_home }}/.cargo/bin/cargo"
      become_user: "{{ user_id }}"

    # -------------------------------------------------------
    # 3. Atuin 설치 + .bashrc 연동
    # -------------------------------------------------------
    - name: Install Atuin
      ansible.builtin.shell: curl --proto '=https' --tlsv1.2 -sSf https://setup.atuin.sh | sh
      args:
        creates: "{{ user_home }}/.atuin/bin/atuin"
      become_user: "{{ user_id }}"

    # -------------------------------------------------------
    # 4. Neovim 최신 설치 (GitHub API + GITHUB_TOKEN + ARM 매핑)
    # -------------------------------------------------------
    - name: Get latest Neovim release info (GitHub API)
      ansible.builtin.uri:
        url: https://api.github.com/repos/neovim/neovim/releases/latest
        return_content: true
        headers: "{{ github_headers }}"
      register: neovim_release

    - name: Set Neovim variables (arch mapping)
      ansible.builtin.set_fact:
        neovim_version: "{{ (neovim_release.json.tag_name | regex_replace('^v','')) }}"
        neovim_arch: >-
          {{
            'x86_64' if ansible_facts.architecture in ['x86_64', 'amd64']
            else 'arm64' if ansible_facts.architecture in ['aarch64', 'arm64']
            else 'unsupported'
          }}

    - name: Install Neovim (tarball) into /opt and symlink
      block:
        - name: Create Neovim installation directory
          ansible.builtin.file:
            path: "/opt/nvim-{{ neovim_version }}"
            state: directory
            mode: "0755"

        - name: Download and extract Neovim tarball
          ansible.builtin.unarchive:
            src: "https://github.com/neovim/neovim/releases/download/v{{ neovim_version }}/nvim-linux-{{ neovim_arch }}.tar.gz"
            dest: "/opt/nvim-{{ neovim_version }}"
            remote_src: true
            extra_opts: [--strip-components=1]

        - name: Create symlink for nvim
          ansible.builtin.file:
            src: "/opt/nvim-{{ neovim_version }}/bin/nvim"
            dest: "/usr/local/bin/nvim"
            state: link
            force: true
      when: neovim_arch != "unsupported"

    # -------------------------------------------------------
    # 5. LazyGit 설치 (GitHub API + GITHUB_TOKEN + ARM 매핑)
    # -------------------------------------------------------
    - name: Get LazyGit release info (GitHub API)
      ansible.builtin.uri:
        url: https://api.github.com/repos/jesseduffield/lazygit/releases/latest
        return_content: true
        headers: "{{ github_headers }}"
      register: lg_release

    - name: Set LazyGit variables (arch mapping)
      ansible.builtin.set_fact:
        lazygit_tag: "{{ lg_release.json.tag_name }}"
        lazygit_arch: >-
          {{
            'x86_64' if ansible_facts.architecture in ['x86_64', 'amd64']
            else 'arm64' if ansible_facts.architecture in ['aarch64', 'arm64']
            else 'unsupported'
          }}

    - name: Install LazyGit binary (GitHub)
      ansible.builtin.unarchive:
        src: "https://github.com/jesseduffield/lazygit/releases/download/{{ lazygit_tag }}/lazygit_{{ lazygit_tag | regex_replace('^v','') }}_Linux_{{ lazygit_arch }}.tar.gz"
        dest: "/usr/local/bin"
        remote_src: true
        include: ["lazygit"]
      when: lazygit_arch != "unsupported"

    # -------------------------------------------------------
    # 4. Lazy Series Tools (git, docker, ssh)
    # -------------------------------------------------------

    # [Lazygit] - PPA 방식 (Ubuntu 전용)
    - name: Add Lazygit PPA
      apt_repository:
        repo: "ppa:lazygit-team/release"
        state: present
      when: ansible_facts.distribution == 'Ubuntu'

    - name: Install Lazygit
      apt:
        name: lazygit
        state: present
        update_cache: yes
      when: ansible_facts.distribution == 'Ubuntu'

    # [Lazydocker] - 바이너리 직접 설치 (권장)
    - name: Get latest Lazydocker version
      uri:
        url: https://api.github.com/repos/jesseduffield/lazydocker/releases/latest
        return_content: true
      register: lazydocker_json

    - name: Install Lazydocker
      unarchive:
        src: "https://github.com/jesseduffield/lazydocker/releases/download/{{ lazydocker_json.json.tag_name }}/lazydocker_{{ lazydocker_json.json.tag_name | regex_replace('^v','') }}_Linux_{{ 'x86_64' if ansible_facts.architecture in ['x86_64', 'amd64'] else 'arm64' }}.tar.gz"
        dest: /usr/local/bin
        remote_src: yes
        include: ["lazydocker"]
        mode: "0755"
      become: true

    # [Lazyssh] - GitHub 바이너리 설치
    - name: Get latest Lazyssh version
      uri:
        url: https://api.github.com/repos/Adembc/lazyssh/releases/latest
        return_content: true
      register: lazyssh_json

    - name: Install Lazyssh
      unarchive:
        src: "https://github.com/Adembc/lazyssh/releases/download/{{ lazyssh_json.json.tag_name }}/lazyssh_{{ lazyssh_json.json.tag_name | regex_replace('^v','') }}_Linux_{{ 'x86_64' if ansible_facts.architecture in ['x86_64', 'amd64'] else 'arm64' }}.tar.gz"
        dest: /usr/local/bin
        remote_src: yes
        include: ["lazyssh"]
        mode: "0755"
      become: true

    # -------------------------------------------------------
    # 6. Node.js/NPM 글로벌 패키지
    # -------------------------------------------------------
    - name: Install global npm packages
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: present
      loop:
        - "@ast-grep/napi"
        - "neovim"
        - "tree-sitter-cli"

    # -------------------------------------------------------
    # 7. uv + Python tools (httpie 포함)
    # -------------------------------------------------------
    - name: Install uv
      ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: "{{ user_home }}/.local/bin/uv"
      become_user: "{{ user_id }}"

    - name: Install Python tools via uv
      ansible.builtin.shell: "{{ user_home }}/.local/bin/uv tool install {{ item }}"
      loop: [posting, mitmproxy, thefuck, httpie]
      become_user: "{{ user_id }}"
      ignore_errors: yes

    # -------------------------------------------------------
    # 8. Cargo tools (creates 정확)
    # -------------------------------------------------------
    - name: Install Rust tools via Cargo
      ansible.builtin.shell: "{{ user_home }}/.cargo/bin/cargo install {{ item.name }}"
      loop: "{{ cargo_tools }}"
      become_user: "{{ user_id }}"
      args:
        creates: "{{ user_home }}/.cargo/bin/{{ item.bin }}"

    # Yazi Install
    - name: Install Yazi via Cargo
      shell: "{{ user_home }}/.cargo/bin/cargo install --locked yazi-fm yazi-cli"
      become_user: "{{ user_id }}"
      args:
        # yazi 바이너리가 이미 존재하면 설치를 건너뜁니다.
        creates: "{{ user_home }}/.cargo/bin/yazi"

    # -------------------------------------------------------
    # 9. Nerd Font 설치 (creates 추가) + font cache
    # -------------------------------------------------------
    - name: Ensure fonts directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/.local/share/fonts"
        state: directory
        mode: "0755"
      become_user: "{{ user_id }}"

    - name: Install Hack Nerd Font
      ansible.builtin.unarchive:
        src: "https://github.com/ryanoasis/nerd-fonts/releases/download/v{{ nerdfonts_ver }}/Hack.zip"
        dest: "{{ user_home }}/.local/share/fonts"
        remote_src: true
        creates: "{{ user_home }}/.local/share/fonts/HackNerdFont-Regular.ttf"
      become_user: "{{ user_id }}"

    - name: Refresh font cache
      ansible.builtin.command: fc-cache -f
      become_user: "{{ user_id }}"
      changed_when: false

    # -------------------------------------------------------
    # 10. .bashrc 설정 (cd alias는 중복 없이 1회만)
    # -------------------------------------------------------
    - name: Add direnv hook to .bashrc
      lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: 'eval "$(direnv hook bash)"'
        state: present
      become_user: "{{ user_id }}"
    - name: Add init scripts and aliases to .bashrc (idempotent)
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: "{{ item }}"
        state: present
      loop:
        - 'export PATH="$HOME/.atuin/bin:$PATH"'
        - 'eval "$(atuin init bash)"'
        - 'eval "$(thefuck --alias)"'
        - 'eval "$(zoxide init bash)"'
        - 'eval "$(starship init bash)"'
        - 'alias cd="z"'
        - 'alias vim="nvim"'
        - 'alias vi="nvim"'
        - 'alias ls="eza --icons --group-directories-first"'
        - 'alias ll="eza -alh --icons --group-directories-first --git"'
        - 'alias lt="eza --tree --level=2 --icons"'
      become_user: "{{ user_id }}"
    - name: Add Yazi smart-cd function (ya) to .bashrc
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: YAZI FUNCTION"
        block: |
          function ya() {
              local tmp="$(mktemp -t "yazi-cwd.XXXXX")"
              yazi "$@" --cwd-file="$tmp"
              if cwd="$(cat -- "$tmp")" && [ -n "$cwd" ] && [ "$cwd" != "$PWD" ]; then
                  cd -- "$cwd"
              fi
              rm -f -- "$tmp"
          }
      become_user: "{{ user_id }}"
