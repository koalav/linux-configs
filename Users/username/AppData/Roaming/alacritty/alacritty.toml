[window]
padding = { x = 10, y = 10 } # 창 가장자리 여백 (답답함 해소)
dynamic_padding = true
opacity = 0.98 # 90% 불투명도 (배경이 살짝 비침)
decorations = "Buttonless" # 깔끔한 창 테두리

# 폰트를 JetBrains Mono로 설정 (설치되어 있어야 함)
[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font]
size = 15.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "regular"

[cursor]
style = { shape = "Block", blinking = "Off" } # 커서 깜빡임 끄기 (성능 향상)

[selection]
save_to_clipboard = true

